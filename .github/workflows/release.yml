name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate release tag and repository
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$GITHUB_REPOSITORY" == "tae2089/thread-keep" ]]
          test -f LICENSE

      - name: Verify source and release tooling
        run: |
          make test
          make vet
          make build
          make release-test
          make e2e

      - name: Check GoReleaser configuration
        run: |
          npm_config_cache="$RUNNER_TEMP/npm-cache" npx --yes @goreleaser/goreleaser@2.17.0 check
          npm_config_cache="$RUNNER_TEMP/npm-cache" npx --yes @goreleaser/goreleaser@2.17.0 check --config .goreleaser.docker.yaml

      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  build:
    needs: verify
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x64
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            goos: linux
            goarch: arm64
          - runner: macos-15-intel
            target: darwin-x64
            goos: darwin
            goarch: amd64
          - runner: macos-15
            target: darwin-arm64
            goos: darwin
            goarch: arm64
          - runner: windows-2025
            target: win32-x64
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install MinGW
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw --no-progress -y
          where.exe gcc

      - name: Build native target with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: build --single-target --clean --snapshot
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}

      - name: Stage target-qualified assets
        shell: bash
        run: node scripts/release/stage-target.mjs --dist=dist --out=release-staging --target=${{ matrix.target }}

      - name: Upload native assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-staging/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js for release tooling
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Set up Python for wheel assembly
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download native assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-staging
          merge-multiple: true

      - name: Derive release version
        id: release
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Assemble GitHub release assets
        run: >-
          node scripts/release/assemble-release.mjs
          --artifacts=release-staging
          --out=release
          --repository=${{ github.repository }}
          --tag=${{ github.ref_name }}
          --version=${{ steps.release.outputs.version }}

      - name: Assemble platform wheels from GoReleaser artifacts
        run: >-
          python3 scripts/release/build_wheels.py
          --artifacts=release-staging
          --config=scripts/release/release-config.json
          --license=LICENSE
          --out=release/wheels
          --repository=${{ github.repository }}
          --template=pypi/thread_keep
          --version=${{ steps.release.outputs.version }}

      - name: Validate wheel archives
        shell: bash
        run: |
          set -euo pipefail
          test "$(find release/wheels -mindepth 2 -maxdepth 2 -name '*.whl' -type f | wc -l | tr -d ' ')" = "35"
          for distribution in release/wheels/*; do
            test "$(find "$distribution" -maxdepth 1 -name '*.whl' -type f | wc -l | tr -d ' ')" = "5"
          done
          for wheel in release/wheels/*/*.whl; do
            python3 -m zipfile -t "$wheel"
          done

      - name: Publish or verify GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            published="$RUNNER_TEMP/published-release"
            mkdir -p "$published"
            gh release download "${{ github.ref_name }}" --dir "$published"
            find release/assets -maxdepth 1 -type f -exec basename {} \; | sort > "$RUNNER_TEMP/local-assets"
            find "$published" -maxdepth 1 -type f -exec basename {} \; | sort > "$RUNNER_TEMP/published-assets"
            cmp "$RUNNER_TEMP/local-assets" "$RUNNER_TEMP/published-assets"
            cmp release/assets/checksums.txt "$published/checksums.txt"
            (cd "$published" && sha256sum --check checksums.txt)
          else
            gh release create "${{ github.ref_name }}" \
              release/assets/* \
              --verify-tag \
              --generate-notes \
              --title "${{ github.ref_name }}"
          fi

      - name: Upload PyPI wheels
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheels
          path: release/wheels/*/*.whl
          if-no-files-found: error
          retention-days: 1

  pypi-packs:
    needs: release
    strategy:
      fail-fast: true
      matrix:
        language:
          - typescript
          - javascript
          - python
          - java
          - kotlin
          - rust
    runs-on: ubuntu-24.04
    environment:
      name: pypi-${{ matrix.language }}
      url: https://pypi.org/p/thread-keep-pack-${{ matrix.language }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for integrity preflight
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Download PyPI wheels
        uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: release/wheels

      - name: Verify any existing PyPI wheel integrity
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          node scripts/release/verify-pypi.mjs \
            --distribution="thread-keep-pack-${{ matrix.language }}" \
            --version="$version" \
            --wheels="release/wheels/thread-keep-pack-${{ matrix.language }}"

      - name: Publish pack platform wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release/wheels/thread-keep-pack-${{ matrix.language }}/
          skip-existing: true
          print-hash: true

  pypi:
    needs: pypi-packs
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/thread-keep
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js for integrity preflight
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Download PyPI wheels
        uses: actions/download-artifact@v4
        with:
          name: pypi-wheels
          path: release/wheels

      - name: Verify any existing PyPI wheel integrity
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          node scripts/release/verify-pypi.mjs \
            --distribution=thread-keep \
            --version="$version" \
            --wheels=release/wheels/thread-keep

      - name: Publish core platform wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release/wheels/thread-keep/
          skip-existing: true
          print-hash: true

  containers:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install CGO cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          gcc --version
          aarch64-linux-gnu-gcc --version

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish container images with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --config .goreleaser.docker.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
