apiVersion: v1
kind: Namespace
metadata:
  name: thread-keep-runners
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: thread-keep-coordinator
  namespace: thread-keep-runners
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: thread-keep-runner-job
  namespace: thread-keep-runners
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: thread-keep-runner-manager
  namespace: thread-keep-runners
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: thread-keep-runner-manager
  namespace: thread-keep-runners
subjects:
  - kind: ServiceAccount
    name: thread-keep-coordinator
    namespace: thread-keep-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: thread-keep-runner-manager
